name: Backend ACR Image CI

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      build_command:
        required: true
        type: string
      enable_sonar:
        required: false
        default: false
        type: boolean
      sonar_project_key:
        required: false
        default: ""
        type: string
    secrets:
      ACR_LOGIN_SERVER:
        required: true
      ACR_USERNAME:
        required: true
      ACR_PASSWORD:
        required: true
      SONAR_TOKEN:
        required: false

concurrency:
  group: build-${{ inputs.service_name }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven
          cache-dependency-path: ${{ inputs.service_path }}/pom.xml

      - name: Build with Maven
        working-directory: ${{ inputs.service_path }}
        run: ${{ inputs.build_command }}

      - name: SonarCloud scan
        if: inputs.enable_sonar && github.event_name == 'push' && secrets.SONAR_TOKEN != ''
        continue-on-error: true
        working-directory: ${{ inputs.service_path }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=${{ inputs.sonar_project_key }} \
            -Dsonar.organization=${{ github.repository_owner }} \
            -DskipTests

      - name: Build and push Docker image
        shell: bash
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        run: |
          if [ -z "$ACR_LOGIN_SERVER" ]; then
            echo "ACR_LOGIN_SERVER secret is required." >&2
            exit 1
          fi

          IMAGE_TAG="${GITHUB_SHA}"
          IMAGE_NAME="$ACR_LOGIN_SERVER/${{ inputs.service_name }}:$IMAGE_TAG"

          echo "${{ secrets.ACR_PASSWORD }}" | docker login "$ACR_LOGIN_SERVER" -u "${{ secrets.ACR_USERNAME }}" --password-stdin
          docker build -t "$IMAGE_NAME" "./${{ inputs.service_path }}"
          docker push "$IMAGE_NAME"
