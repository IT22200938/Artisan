name: API Gateway CI/CD

on:
  push:
    branches: [main, master]
    paths:
      - "api-gateway/**"
      - ".github/workflows/api-gateway-ci.yml"
      - ".github/workflows/azure-containerapp-deploy.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "api-gateway/**"
      - ".github/workflows/api-gateway-ci.yml"
      - ".github/workflows/azure-containerapp-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/azure-containerapp-deploy.yml
    with:
      service_name: api-gateway
      service_path: api-gateway
      container_app_name: api-gateway
      build_command: mvn clean verify -B
      inject_user_service_url: true
      inject_listing_service_url: true
      inject_order_service_url: true
      inject_review_service_url: true
    secrets: inherit
