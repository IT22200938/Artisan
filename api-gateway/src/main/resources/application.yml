spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # User Service - auth
        - id: user-service-auth
          uri: ${USER_SERVICE_URL:http://localhost:8080}
          predicates:
            - Path=/api/auth/**

        # User Service - users
        - id: user-service-users
          uri: ${USER_SERVICE_URL:http://localhost:8080}
          predicates:
            - Path=/api/users/**

        # Listing Service
        - id: listing-service
          uri: ${LISTING_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/listings/**

        # Order Service
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/orders/**

        # Review Service
        - id: review-service
          uri: ${REVIEW_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/reviews/**

        # OpenAPI docs - proxy to each service for unified Swagger UI
        - id: user-service-openapi
          uri: ${USER_SERVICE_URL:http://localhost:8080}
          predicates:
            - Path=/openapi/user-service/**
          filters:
            - StripPrefix=2

        - id: listing-service-openapi
          uri: ${LISTING_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/openapi/listing-service/**
          filters:
            - StripPrefix=2

        - id: order-service-openapi
          uri: ${ORDER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/openapi/order-service/**
          filters:
            - StripPrefix=2

        - id: review-service-openapi
          uri: ${REVIEW_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/openapi/review-service/**
          filters:
            - StripPrefix=2

      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:8080"
              - "http://localhost:5173"
              - "http://localhost:3000"
            allowedOriginPatterns: 
              - "*"
            allowedMethods: 
              - "GET"
              - "POST"
              - "PUT"
              - "DELETE"
              - "OPTIONS"
              - "PATCH"
            allowedHeaders:
              - "*"
            allowCredentials: true

server:
  port: ${PORT:8084}

management:
  endpoints:
    web:
      exposure:
        include: health,gateway
  endpoint:
    health:
      show-details: when-authorized

# Unified Swagger UI - aggregates all microservice APIs
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: User Service
        url: /openapi/user-service/v3/api-docs
      - name: Listing Service
        url: /openapi/listing-service/v3/api-docs
      - name: Order Service
        url: /openapi/order-service/v3/api-docs
      - name: Review Service
        url: /openapi/review-service/v3/api-docs
