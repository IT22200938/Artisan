# Run API Gateway + 4 microservices
#
# MongoDB Atlas: Create .env (see .env.example), set SPRING_DATA_MONGODB_URI, then: docker-compose up --build -d
# Local MongoDB: docker-compose up --build -d
#
# Single entry point: http://localhost:8084 (API Gateway routes to all services)

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile.compose
    ports:
      - "8086:8080"
    environment:
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI:-mongodb://mongodb:27017}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production-min-256-bits}
    depends_on:
      - mongodb

  listing-service:
    build:
      context: ./listing-service
      dockerfile: Dockerfile.compose
    ports:
      - "8081:8081"
    environment:
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI:-mongodb://mongodb:27017}
    depends_on:
      - mongodb

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile.compose
    ports:
      - "8082:8082"
    environment:
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI:-mongodb://mongodb:27017}
      USER_SERVICE_URL: http://user-service:8080
      LISTING_SERVICE_URL: http://listing-service:8081
    depends_on:
      - user-service
      - listing-service

  review-service:
    build:
      context: ./review-service
      dockerfile: Dockerfile.compose
    ports:
      - "8083:8083"
    environment:
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI:-mongodb://mongodb:27017}
      USER_SERVICE_URL: http://user-service:8080
    depends_on:
      - user-service

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile.compose
    ports:
      - "8084:8084"
    environment:
      USER_SERVICE_URL: http://user-service:8080
      LISTING_SERVICE_URL: http://listing-service:8081
      ORDER_SERVICE_URL: http://order-service:8082
      REVIEW_SERVICE_URL: http://review-service:8083
    depends_on:
      - user-service
      - listing-service
      - order-service
      - review-service

volumes:
  mongo_data: {}
